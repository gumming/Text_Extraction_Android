name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # اختياري: إذا كان لديك سكربت بايثون لتحضير الصور أو التشفير
      # - name: Run Data Preparation Script
      #   run: python3 scripts/prepare_assets.py

      - name: Build APK (Release)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          # هذا سيقوم برفع ملفات APK منفصلة لكل معمارية (arm64-v8a, armeabi-v7a, x86_64)
          # مما يقلل حجم التطبيق لكل مستخدم
          path: build/app/outputs/flutter-apk/*.apk
